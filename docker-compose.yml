services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wijnpick}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-wijnpick}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wijnpick}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wijnpick}:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/${POSTGRES_DB:-wijnpick}
      SECRET_KEY: ${SECRET_KEY:-changeme_in_production}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_VISION_MODEL: ${GEMINI_VISION_MODEL:-gemini-2.5-flash}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      MATCH_THRESHOLD: ${MATCH_THRESHOLD:-0.75}
      UPLOAD_DIR: /app/uploads
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme_in_production}
      TOKEN_EXPIRE_DAYS: ${TOKEN_EXPIRE_DAYS:-90}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - uploads:/app/uploads:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
