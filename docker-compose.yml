services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wijnpick}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-wijnpick}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wijnpick}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wijnpick}:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/${POSTGRES_DB:-wijnpick}
      SECRET_KEY: ${SECRET_KEY:-changeme_in_production}
      CLIP_MODEL: ${CLIP_MODEL:-ViT-B-32}
      CLIP_PRETRAINED: ${CLIP_PRETRAINED:-openai}
      MATCH_THRESHOLD: ${MATCH_THRESHOLD:-0.75}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
      - model_cache:/root/.cache
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html:ro
      - uploads:/app/uploads:ro
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  model_cache:
