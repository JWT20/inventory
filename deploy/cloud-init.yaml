#cloud-config
package_update: true

packages:
  - git

runcmd:
  # Open firewall ports using iptables (native on OCI Oracle Linux 9)
  # Do this FIRST so the server becomes reachable quickly
  - iptables -I INPUT -p tcp --dport 80 -j ACCEPT
  - iptables -I INPUT -p tcp --dport 443 -j ACCEPT
  - iptables-save > /etc/sysconfig/iptables || true

  # Remove conflicting Podman/Buildah packages (Oracle Linux 9 ships these by default)
  - dnf remove -y podman podman-docker buildah containers-common || true

  # Install Docker CE from official repo (use centos repo for Oracle Linux compatibility)
  - dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  - dnf install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker opc

  # Install Caddy for automatic HTTPS
  - dnf install -y 'dnf-command(copr)' || true
  - dnf copr enable -y @caddy/caddy || true
  - |
    dnf install -y caddy || {
      curl -sL "https://caddyserver.com/api/download?os=linux&arch=arm64" -o /tmp/caddy
      mv /tmp/caddy /usr/bin/caddy
      chmod +x /usr/bin/caddy
      groupadd --system caddy 2>/dev/null || true
      useradd --system --gid caddy --create-home --home-dir /var/lib/caddy --shell /usr/sbin/nologin caddy 2>/dev/null || true
    }

  # Clone the app repo
  - git clone -b main https://github.com/JWT20/inventory.git /opt/wijnpick

  # Generate .env with real random passwords (unquoted heredoc so shell expands $(...))
  - |
    cat > /opt/wijnpick/.env << ENVEOF
    POSTGRES_USER=wijnpick
    POSTGRES_PASSWORD=$(openssl rand -hex 16)
    POSTGRES_DB=wijnpick
    SECRET_KEY=$(openssl rand -hex 32)
    GEMINI_API_KEY=${gemini_api_key}
    GEMINI_VISION_MODEL=gemini-2.5-flash
    GEMINI_EMBEDDING_MODEL=gemini-embedding-001
    MATCH_THRESHOLD=0.75
    ADMIN_PASSWORD=$(openssl rand -hex 16)
    KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    DOMAIN=${domain}
    ENVEOF
  - chown -R opc:opc /opt/wijnpick

  # Configure Caddy with domain
  - |
    mkdir -p /etc/caddy
    export DOMAIN="${domain}"
    envsubst '${DOMAIN}' < /opt/wijnpick/deploy/Caddyfile > /etc/caddy/Caddyfile
  - systemctl enable caddy

  # Install OCI CLI for backups (as opc user)
  - |
    sudo -u opc bash -c 'bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults'
  # Instance principal auth (no config file needed, uses VM's identity)
  - |
    cat > /etc/oci-cli.env << 'OCIEOF'
    OCI_CLI_AUTH=instance_principal
    OCIEOF

  # Copy backup script and set up nightly cron (2:30 AM)
  - cp /opt/wijnpick/deploy/backup-db.sh /opt/wijnpick/backup-db.sh
  - chmod +x /opt/wijnpick/backup-db.sh
  - |
    cat > /etc/cron.d/wijnpick-backup << 'CRONEOF'
    30 2 * * * root source /opt/wijnpick/.env && export OCI_CLI_AUTH=instance_principal && /opt/wijnpick/backup-db.sh >> /var/log/wijnpick-backup.log 2>&1
    CRONEOF
  - chmod 644 /etc/cron.d/wijnpick-backup

  # Deploy the app and start Caddy
  - cd /opt/wijnpick && docker compose up -d
  - systemctl start caddy
