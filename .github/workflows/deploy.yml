name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: pytest -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync app files to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git' --exclude='.env' --exclude='deploy' --exclude='__pycache__'
          path: ./
          remote_path: /opt/wijnpick/
          remote_host: ${{ secrets.SERVER_IP }}
          remote_user: deploy
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sync Caddyfile to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz
          path: deploy/Caddyfile
          remote_path: /opt/wijnpick/deploy/
          remote_host: ${{ secrets.SERVER_IP }}
          remote_user: deploy
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Update Caddy config and rebuild containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/wijnpick
            set -a; source .env; set +a
            envsubst '${DOMAIN}' < deploy/Caddyfile | sudo tee /etc/caddy/Caddyfile > /dev/null
            sudo systemctl reload caddy
            sudo docker compose build --no-cache
            sudo docker compose up -d
            sudo docker compose ps
